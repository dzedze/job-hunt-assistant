name: ci for job hunt assistant

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  lint-static-type-security-checks:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.12
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run ruff
        run: |
          ruff check .
      - name: Run black
        run: |
          black --check .
      - name: Static type checks
        run: |
          mypy .
      - name: Security checks
        run: |
          bandit -c pyproject.toml -r .
  
  tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.12
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test]"
      - name: Run tests with coverage
        run: |
          pytest --cov=. tests/